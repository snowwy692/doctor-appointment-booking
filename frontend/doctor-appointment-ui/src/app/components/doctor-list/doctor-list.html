<div class="container mt-4">
  <h2 class="mb-4">👨‍⚕️ Available Doctors</h2>
  <div class="row">
    <div class="col-md-4 mb-4" *ngFor="let doctor of doctors">
      <div class="card shadow h-100">
        <div class="card-body">
          <h5 class="card-title">{{ doctor.name }}</h5>
          <p class="card-text">
            <span class="badge bg-primary mb-2">{{ doctor.specialization }}</span><br>
            <strong>Experience:</strong> {{ doctor.experience }} years<br>
            <strong>Fees:</strong> ₹{{ doctor.fees }}
          </p>
          <button class="btn btn-success w-100" (click)="bookAppointment(doctor.id)">
            Book Appointment
          </button>
        </div>
      </div>
    </div>
  </div>
  <div *ngIf="doctors.length === 0" class="text-center mt-5">
    <p class="text-muted">No doctors available right now.</p>
  </div>
</div>
